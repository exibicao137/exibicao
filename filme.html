<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://www.exibicao.com.br/favicon.png" type="image/png">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <title>Assistir | Exibição</title>
    <link rel="stylesheet" href="style.css">
    <style>
    /* --- ESTRUTURA BASE (Não mexe no que você já tinha) --- */
    .container-filme {
        padding: 120px 5% 60px;
        max-width: 1100px;
        margin: auto;
        min-height: 100vh;
        flex: 1; /* Novo: essencial para o modo colunas */
    }

    /* --- O QUE FAZ AS LATERAIS APARECEREM (Ajustado) --- */
    .container-principal-exibicao {
        display: block; /* Por padrão, age como se as laterais não existissem */
        width: 100%;
    }

    .coluna-ads {
        display: none; /* Escondido no celular e telas normais */
        width: 160px;
        position: sticky;
        top: 120px;
        margin-top: 120px;
    }

    .placeholder-ad {
        background: #0a0a0a;
        border: 1px dashed #333;
        height: 600px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #444;
        font-size: 11px;
        letter-spacing: 2px;
    }

    /* --- SEUS ESTILOS DE CONTEÚDO (Intactos) --- */
    .voltar-link { display: inline-block; color: var(--text-dim); text-decoration: none; margin-bottom: 25px; font-weight: bold; transition: 0.3s; }
    .voltar-link:hover { color: var(--primary); }
    .player-wrapper { position: relative; padding-bottom: 56.25%; height: 0; background: #000; border-radius: 12px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.8); border: 1px solid #333; }
    .player-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    .detalhes-filme { margin-top: 40px; }
    .detalhes-filme h1 { font-size: 2.8rem; margin-bottom: 10px; color: var(--branco); }
    .meta-info { display: flex; gap: 15px; margin-bottom: 20px; }
    .categoria-badge { background: var(--primary); color: white; padding: 4px 12px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; text-transform: uppercase; }
    .sinopse-texto { font-size: 1.2rem; color: var(--text-dim); max-width: 800px; line-height: 1.8; }

    /* --- SÓ ATIVA AS LATERAIS SE A TELA FOR GIGANTE (Mínimo 1500px) --- */
    @media (min-width: 1500px) {
        .container-principal-exibicao {
            display: flex; /* Aqui ele vira colunas */
            justify-content: center;
            padding: 0 20px;
        }
        .coluna-ads {
            display: block;
        }
        .container-filme {
            margin: 0; /* Remove o auto para não empurrar as colunas */
        }
    }

    @media (max-width: 768px) {
        .detalhes-filme h1 { font-size: 2rem; }
        .container-filme { padding-top: 80px; }
    }
</style>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9105383408775362"
     crossorigin="anonymous"></script>

</head>
<body>

    <div class="logo-container">

<main class="container-principal-exibicao">

    <div class="container-filme">
        <a href="explorar.html" class="voltar-link">← Voltar ao Catálogo</a>

        <div class="player-wrapper" id="video-display"></div>

        <div class="detalhes-filme">
            <div class="meta-info">
                <span id="filme-categoria" class="categoria-badge">Gênero</span>
            </div>
            <h1 id="filme-titulo">Carregando título...</h1>
            <p id="filme-sinopse" class="sinopse-texto">Buscando informações do filme...</p>
        </div>

        <div class="detalhes-filme" style="margin-top: 60px; border-top: 1px solid #333; padding-top: 40px;">
            <h2 style="color: var(--branco); margin-bottom: 20px;">Comentários</h2>
            <div class="giscus"></div>
            <script src="https://giscus.app/client.js"
                data-repo="exibicao137/exibicao"
                data-repo-id="R_kgDORR1h0Q"
                data-category="Announcements"

                data-mapping="pathname"

                data-reactions-enabled="1"
                data-emit-metadata="0"

                crossorigin="anonymous"
                async>
            </script>
        </div>
    </div>

    <aside class="coluna-ads lateral-direita">
        <div class="placeholder-ad">ANÚNCIO</div>
    </aside>

</main>

<script src="dados.js"></script>

<script>
    // 1. Captura o ID que vem na URL (ex: ?id=Eqcv6iNuE9I)
    const urlParams = new URLSearchParams(window.location.search);
    const videoId = urlParams.get('id');

    // 2. Busca o filme no nosso "banco de dados" (dados.js)
    const filme = trailers.find(t => t.idVideo === videoId);

    // 3. Se encontrar o filme, preenche a página
    if (filme) {
        document.title = `${filme.titulo} | Exibição`;
        document.getElementById('filme-titulo').innerText = filme.titulo;
        document.getElementById('filme-categoria').innerText = filme.categoria;
        
        // Se você não tiver colocado sinopse no dados.js, ele usa uma padrão
        document.getElementById('filme-sinopse').innerText = filme.sinopse || "Sinopse não disponível para este trailer.";

        // Injeta o player do YouTube
        document.getElementById('video-display').innerHTML = `
            <iframe 
                src="https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0" 
                frameborder="0" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen>
            </iframe>
        `;

    // 4. Configuração do Disqus
        var disqus_config = function () {
            this.page.url = window.location.href;  // URL completa da página
            this.page.identifier = videoId;        // Usa o ID do vídeo como identificador único
        };

        (function() { 
            var d = document, s = d.createElement('script');
            // ATENÇÃO: Substitua 'SEU-NOME-AQUI' pelo nome que você criar no site do Disqus
            s.src = 'https://SEU-NOME-AQUI.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
        })();

    } else {
        // Se o filme não existir (ID errado), volta para o catálogo
        window.location.href = 'explorar.html';
    }
</script>

</body>
</html>
