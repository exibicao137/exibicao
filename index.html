    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exibição | Trailers e Lançamentos</title>

</head>
<body>

<header>
    <div class="logo-container">
        <a href="index.html">
            <img src="logo.png" alt="EXIBIÇÃO" class="logo-img">
        </a>
    </div>
    
    <nav class="menu-abas">

            <li><a href="contato.html">Contato</a></li>
        </ul>
    </nav>
</header>

<div class="hero-carousel">
    <div id="carousel-inner"></div>
    <div class="carousel-controls">
        </div>
</div>

<div class="container">
    <h2 style="margin-bottom: 30px; border-left: 4px solid var(--primary); padding-left: 15px;">Explorar Catálogo</h2>
    <div class="video-grid" id="main-grid"></div>
</div>

<div id="videoModal">
    <div style="position: relative; width: 90%; max-width: 900px;">
        <button onclick="fecharVideo()" style="position: absolute; top: -40px; right: 0; background: none; border: none; color: white; font-size: 18px; cursor: pointer;">✕ FECHAR</button>
        <div id="videoPlayer"></div>
    </div>
</div>

<footer>
    <p>&copy; 2026 Exibição - Todos os direitos reservados.</p>
    <div class="footer-links">
        <a href="privacidade.html">Privacidade</a>
        <span>|</span>
        <a href="termos.html">Termos de Uso</a>
    </div>
</footer>

<script>
    // AQUI VOCÊ MANTÉM A SUA LISTA DE TRAILERS IGUAL ESTAVA
    const trailers = [
        {
            titulo: "Pânico 7 | Paramount Pictures Brasil",
            idVideo: "Eqcv6iNuE9I", 
            dataPublicacao: "2026-02-24",
            sinopse: "Cada facada nos trouxe até aqui. 🔪 Assista ao trailer final de #Pânico7 e se prepare para gritar nos cinemas em 26 de fevereiro!"
        },
        // ... adicione os outros aqui ...
    ];

    let slideAtual = 0;

    window.ativarVideo = function(id) {
        const modal = document.getElementById('videoModal');
        const player = document.getElementById('videoPlayer');
        player.innerHTML = `<div style="position: relative; padding-bottom: 56.25%; height: 0;"><iframe style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;" src="https://www.youtube.com/embed/${id}?autoplay=1" frameborder="0" allowfullscreen></iframe></div>`;
        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden';
    };

    window.fecharVideo = function() {
        document.getElementById('videoModal').style.display = 'none';
        document.getElementById('videoPlayer').innerHTML = "";
        document.body.style.overflow = 'auto';
    };

    function mudarSlide(direcao) {
        const slides = document.querySelectorAll('.slide');
        if (slides.length === 0) return;
        slides[slideAtual].classList.remove('active');
        slideAtual = (slideAtual + direcao + slides.length) % slides.length;
        slides[slideAtual].classList.add('active');
    }

    function configurarCarrossel() {
        trailers.sort((a, b) => new Date(b.dataPublicacao) - new Date(a.dataPublicacao));
        const container = document.getElementById('carousel-inner');
        const destaques = trailers.slice(0, 3);
        container.innerHTML = destaques.map((filme, index) => `
            <div class="slide ${index === 0 ? 'active' : ''}" style="background-image: url('https://img.youtube.com/vi/${filme.idVideo}/maxresdefault.jpg')">
                <div class="hero-overlay"></div>
                <div class="hero-content">
                    <h1>${filme.titulo}</h1>
                    <p>${filme.sinopse.substring(0, 150)}...</p>
                    <button onclick="ativarVideo('${filme.idVideo}')" style="background: var(--primary); color: white; border: none; padding: 12px 25px; cursor: pointer; font-weight: bold; border-radius: 4px;">▶ ASSISTIR AGORA</button>
                </div>
            </div>
        `).join('');
        setInterval(() => mudarSlide(1), 5000);
    }

    function carregarTrailers() {
        const grid = document.getElementById('main-grid');
        trailers.forEach(filme => {
            const card = document.createElement('div');
            card.className = 'video-card';
            card.onclick = () => ativarVideo(filme.idVideo);
            card.innerHTML = `
                <div class="video-container" style="background-image: url('https://img.youtube.com/vi/${filme.idVideo}/mqdefault.jpg');"></div>
                <div style="padding: 15px;"><h3>${filme.titulo}</h3></div>
            `;
            grid.appendChild(card);
        });
    }

    window.onload = () => {
        configurarCarrossel();
        carregarTrailers();
    };
</script>
</body>
</html>
