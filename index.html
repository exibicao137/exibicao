<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exibição | Trailers e Lançamentos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo-container">
        <a href="index.html">
            <img src="logo.png" alt="EXIBIÇÃO" class="logo-img">
        </a>
    </div>
    <nav class="menu-abas">
        <ul>
            <li><a href="index.html" class="active">Início</a></li>
            <li><a href="explorar.html">Explorar</a></li>
            <li><a href="sobre.html">Sobre</a></li>
            <li><a href="contato.html">Contato</a></li>
        </ul>
    </nav>
</header>

<main id="hero-banner">
    <div style="height: 80vh; display: flex; align-items: center; justify-content: center; background: #000; color: #333;">
        Carregando destaque...
    </div>
</main>

<div class="container" style="padding: 60px 5%;">
    <h2 style="margin-bottom: 30px; border-left: 4px solid var(--primary); padding-left: 15px; color: white;">
        Recém Chegados
    </h2>
    <div class="movie-grid-thumbs" id="main-grid">
        <p style="color: gray;">Carregando catálogo...</p>
    </div>
</div>

<footer>
    <p>&copy; 2026 Exibição - Todos os direitos reservados.</p>
</footer>

<script src="dados.js"></script>

<script>
    // Função para verificar se os dados carregaram
    function inicializarHome() {
        const grid = document.getElementById('main-grid');
        
        // TESTE: Se a variável 'trailers' não existir, avisa o erro
        if (typeof trailers === 'undefined') {
            console.error("Erro: O arquivo dados.js não foi carregado corretamente.");
            if(grid) grid.innerHTML = "<p style='color: red;'>Erro: Arquivo 'dados.js' não encontrado ou com erro de sintaxe.</p>";
            return;
        }

        configurarBanner();
        carregarCards();
    }

    window.irParaFilme = function(id) {
        window.location.href = `filme.html?id=${id}`;
    };

    function configurarBanner() {
    const hero = document.getElementById('hero-banner');
    const listaOrdenada = [...trailers].sort((a, b) => new Date(b.dataPublicacao) - new Date(a.dataPublicacao));
    const filme = listaOrdenada[0];

    const imgHD = `https://img.youtube.com/vi/${filme.idVideo}/maxresdefault.jpg`;
    const imgReserva = `https://img.youtube.com/vi/${filme.idVideo}/hqdefault.jpg`;

    // Criamos o HTML base com a imagem reserva primeiro para não ficar preto
    hero.innerHTML = `
        <div class="slide active" id="banner-dinamico" style="background-image: url('${imgReserva}'); background-size: cover; background-position: center; height: 80vh; position: relative;">
            <div class="hero-overlay" style="position: absolute; inset: 0; background: linear-gradient(90deg, rgba(0,0,0,0.9) 20%, transparent 100%), linear-gradient(0deg, var(--bg) 10%, transparent 50%);"></div>
            <div class="hero-content" style="position: relative; z-index: 2; padding: 180px 5%;">
                <h1 style="font-size: clamp(2rem, 5vw, 3.5rem); color: white; margin-bottom: 10px;">${filme.titulo}</h1>
                <p style="color: #ccc; max-width: 600px; margin-bottom: 25px; font-size: 1.1rem;">${filme.sinopse.substring(0, 160)}...</p>
                <button class="btn-play" onclick="irParaFilme('${filme.idVideo}')" style="padding: 12px 35px; background: white; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; font-size: 1rem;">▶ Assistir Agora</button>
            </div>
        </div>
    `;

    // TESTE DE ALTA RESOLUÇÃO:
    // O YouTube envia uma imagem de 120px de largura quando o HD não existe.
    const imgTest = new Image();
    imgTest.src = imgHD;
    imgTest.onload = function() {
        if (this.width > 120) {
            // Se a imagem for grande, ela é HD de verdade! Vamos aplicar.
            document.getElementById('banner-dinamico').style.backgroundImage = `url('${imgHD}')`;
        }
    };
}

    function carregarCards() {
        const grid = document.getElementById('main-grid');
        grid.innerHTML = ""; // Limpa o "Carregando..."
        
        const recentes = [...trailers]
            .sort((a, b) => new Date(b.dataPublicacao) - new Date(a.dataPublicacao))
            .slice(0, 8);

        recentes.forEach(filme => {
            const card = document.createElement('div');
            card.className = 'movie-thumb-card';
            card.onclick = () => irParaFilme(filme.idVideo);
            card.innerHTML = `
                <img src="https://img.youtube.com/vi/${filme.idVideo}/hqdefault.jpg" style="width: 100%;">
                <div class="thumb-overlay">
                    <h3>${filme.titulo}</h3>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    // Tenta rodar assim que carregar
    window.onload = inicializarHome;
</script>

</body>
</html>
